apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager
  namespace: hashcrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manager
  template:
    metadata:
      labels:
        app: manager
    spec:
      containers:
        - name: manager
          image: manager:latest
          imagePullPolicy: Never        # ← ЭТО КЛЮЧЕВАЯ СТРОКА
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URI
              value: "mongodb://mongo-0.mongo.hashcrack.svc.cluster.local:27017,mongo-1.mongo.hashcrack.svc.cluster.local:27017,mongo-2.mongo.hashcrack.svc.cluster.local:27017/?replicaSet=rs0"
            - name: RABBIT_URI
              value: "amqp://guest:guest@rabbitmq:5672/"
          readinessProbe:
            httpGet:
              path: /hc
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: manager
  namespace: hashcrack
spec:
  type: LoadBalancer
  selector:
    app: manager
  ports:
    - port: 8000
      targetPort: 8000